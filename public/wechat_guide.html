<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>安全访问提示</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --ios-gray: #f2f2f7;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent-blue: #0071e3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 极简背景：微弱的灰色质感 */
        .wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #ffffff 0%, var(--ios-gray) 100%);
            display: flex; flex-direction: column; align-items: center;
        }

        /* 右上角引导：精致线条箭头 */
        .guide-arrow {
            position: absolute; top: 20px; right: 30px;
            text-align: right;
        }
        .guide-arrow i {
            font-size: 32px; color: var(--text-main);
            animation: arrowMove 2s infinite ease-in-out;
        }
        .guide-arrow p {
            margin: 8px 0 0; font-size: 14px; font-weight: 600;
            color: var(--text-main);
        }

        /* 中心区域 */
        .container {
            margin-top: 35vh; text-align: center; padding: 0 40px;
            animation: fadeIn 0.8s ease-out;
        }

        .icon-box {
            width: 72px; height: 72px; background: #fff;
            border-radius: 18px; margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .icon-box i { font-size: 32px; color: var(--text-main); }

        h2 { font-size: 24px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.5px; }
        p { font-size: 15px; color: var(--text-sub); line-height: 1.5; margin: 0; }

        /* 步骤指示器：Apple 风格列表 */
        .step-list {
            margin-top: 40px; width: 280px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; border: 1px solid rgba(0,0,0,0.05);
            padding: 4px 0;
        }
        .step-row {
            display: flex; align-items: center; padding: 12px 16px;
            font-size: 14px; font-weight: 500;
        }
        .step-row:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.05); }
        .num {
            width: 20px; height: 20px; background: var(--text-main);
            color: #fff; border-radius: 50%; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 12px;
        }

        /* 动画 */
        @keyframes arrowMove {
            0%, 100% { transform: translateY(0) rotate(-15deg); opacity: 1; }
            50% { transform: translateY(-8px) rotate(-15deg); opacity: 0.5; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部官方标识 */
        .footer {
            position: absolute; bottom: 40px; width: 100%;
            text-align: center; color: #c5c5c7; font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="guide-arrow">
        <i class="fa fa-paper-plane-o"></i>
        <p>在浏览器打开</p>
    </div>

    <div class="container">
        <div class="icon-box">
            <i class="fa fa-shield"></i>
        </div>
        <h2>访问受限</h2>
        <p>当前页面包含高级交互功能，<br>请通过系统浏览器以确保安全连接。</p>

        <div class="step-list">
            <div class="step-row">
                <span class="num">1</span>
                <span>轻触右上角更多图标 (•••)</span>
            </div>
            <div class="step-row">
                <span class="num">2</span>
                <span style="color: var(--accent-blue);">选择“在浏览器中打开”</span>
            </div>
        </div>
    </div>

    <div class="footer">
        SECURITY VERIFICATION SYSTEM
    </div>
</div>

</body>
</html>
