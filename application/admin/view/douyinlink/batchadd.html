<form id="batch-add-form" class="form-horizontal" role="form" method="POST">
    <div class="panel panel-default panel-intro">
        <div class="panel-heading">
            <div class="panel-lead">
                <em>批量添加抖音链接</em>
            </div>
        </div>

        <div class="panel-body">
            <div class="form-group">
                <label class="control-label col-xs-12 col-sm-2">批量内容</label>
                <div class="col-xs-12 col-sm-8">
                    <textarea name="content" class="form-control" rows="15" placeholder="格式：链接|备注\n例如：\nhttps://v.douyin.com/iEqYW12WVgU/|测试视频1\nhttps://v.douyin.com/xxxxx/|测试视频2"></textarea>
                    <div class="help-block">
                        每行一条，支持 <code>链接|备注</code>，备注可选。
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="control-label col-xs-12 col-sm-2"></label>
                <div class="col-xs-12 col-sm-8">
                    <button type="submit" class="btn btn-primary">提交</button>
                    <button type="reset" class="btn btn-default">重置</button>
                </div>
            </div>
        </div>
    </div>
</form>
