<div class="panel panel-default">
    <div class="panel-heading">
        <strong>历史记录详情</strong>
    </div>
    <div class="panel-body">
        <table class="table table-bordered table-hover">
            <tr><th>ID</th><td>{$row.id}</td></tr>
            <tr><th>主表ID</th><td>{$row.link_id}</td></tr>
            <tr><th>短链</th><td>{$row.url}</td></tr>
            <tr><th>最终链接</th><td>{$row.final_url}</td></tr>
            <tr><th>作品ID</th><td>{$row.video_id}</td></tr>
            <tr><th>作者名字</th><td>{$row.author_name}</td></tr>
            <tr><th>粉丝数</th><td>{$row.author_fans}</td></tr>
            <tr><th>获赞数</th><td>{$row.author_likes}</td></tr>
            <tr><th>作品点赞数</th><td>{$row.video_like_count}</td></tr>
            <tr><th>评论数</th><td>{$row.comment_count}</td></tr>
            <tr><th>状态</th><td>{$row.status}</td></tr>
            <tr><th>检测状态</th><td>{$row.check_status}</td></tr>
            <tr><th>失败原因</th><td>{$row.check_error}</td></tr>
            <tr><th>抓取时间</th><td>{$row.check_time}</td></tr>
        </table>
    </div>
</div>
